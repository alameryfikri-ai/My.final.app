<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة نبض للرعاية الذكية الموحدة | Nabd Smart Care Unified Single File</title>
  
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Alpine.js for lightweight, bulletproof reactive state management -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a;
    }
    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #06b6d4;
    }
    
    /* Font Declarations matching English/Arabic moods */
    .font-cairo { font-family: 'Cairo', sans-serif; }
    .font-sans { font-family: 'Inter', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }

    [x-cloak] { display: none !important; }
  </style>

  <script>
    // Tailwind Config customization for medical theme
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            slate: {
              850: '#111b2e',
              900: '#0f172a',
              950: '#070b19',
            },
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-cairo antialiased selection:bg-cyan-500 selection:text-slate-950 overflow-x-hidden"
      x-data="nabdApp()" x-init="initApp()">

  <!-- 1. BIOMETRIC LOCK SCREEN / WEBAUTHN SIMULATION OVERLAY -->
  <template x-if="showLockScreen">
    <div class="fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center p-4 overflow-y-auto">
      
      <!-- Background Ambient Glows -->
      <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl -z-10 animate-pulse"></div>
      <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-rose-500/5 rounded-full blur-3xl -z-10"></div>

      <!-- Top Header -->
      <div class="text-center space-y-2 mb-8">
        <div class="inline-flex items-center gap-2 px-3 py-1 bg-slate-900 border border-slate-800 rounded-full text-xs text-slate-400">
          <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
          <span class="font-mono text-[10px]" x-text="getCurrentTime()"></span>
        </div>
        <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-cyan-400 via-teal-400 to-blue-500 bg-clip-text text-transparent">
          منصة نـبـض للرعاية الذكية
        </h1>
        <p class="text-xs text-slate-400 max-w-sm mx-auto leading-relaxed font-sans" x-text="lang === 'ar' ? 'نظام دعم القرار الطبي المتكامل وأدوات الإنذار المبكر الذكية' : 'Integrated Clinical Decision Support & Intelligent Early Warning System'">
        </p>
      </div>

      <!-- Card Core -->
      <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl space-y-6 relative overflow-hidden">
        
        <!-- Header status -->
        <div class="flex justify-between items-center border-b border-slate-800/60 pb-4">
          <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-xl bg-slate-950 flex items-center justify-center border border-slate-800 text-cyan-400 shadow-inner">
              <i data-lucide="shield-check" class="w-5 h-5"></i>
            </div>
            <div>
              <p class="text-xs font-bold text-slate-200" x-text="lang === 'ar' ? 'بوابة الكادر الطبي الآمنة' : 'Secure Clinician Gateway'"></p>
              <p class="text-[9.5px] text-slate-500" x-text="lang === 'ar' ? 'تشفر محلي بالكامل' : '100% Locally Encrypted'"></p>
            </div>
          </div>
          
          <!-- Language Toggle Button -->
          <button @click="toggleLanguage()" class="px-3 py-1 rounded-lg bg-slate-950 hover:bg-slate-800 border border-slate-800 text-[10px] font-bold text-cyan-400 transition-colors">
            <span x-text="lang === 'ar' ? 'English' : 'العربية'"></span>
          </button>
        </div>

        <div class="text-center space-y-2">
          <h2 class="text-base font-bold text-slate-100" x-text="lang === 'ar' ? 'يرجى تأكيد الهوية للدخول' : 'Identity Verification Required'"></h2>
          <p class="text-[11px] text-slate-400 leading-normal px-4" x-text="lang === 'ar' ? 'ضع إصبعك على المستشعر للمصادقة السريعة عبر البصمة الحيوية لجهازك أو استخدم رمز الدخول السريع' : 'Scan fingerprint via device secure WebAuthn biometrics or enter clinical security PIN'">
          </p>
        </div>

        <!-- FINGERPRINT SENSOR PORTAL -->
        <div class="flex flex-col items-center justify-center py-4 space-y-4">
          <button @click="triggerBiometricScan()" 
                  class="w-28 x-28 h-28 rounded-full bg-slate-950 flex flex-col items-center justify-center border-2 transition-all relative overflow-hidden group shadow-2xl cursor-pointer"
                  :class="isScanning ? 'border-cyan-500 scale-95 shadow-cyan-950/40' : 'border-slate-800 hover:border-slate-700'">
            
            <!-- Scanning Laser line -->
            <div x-show="isScanning" class="absolute left-0 right-0 h-1 bg-cyan-400 top-0 shadow-[0_0_15px_#22d3ee] animate-bounce"></div>

            <i data-lucide="fingerprint" class="w-14 h-14 transition-all"
               :class="isScanning ? 'text-cyan-400 scale-105' : 'text-slate-500 group-hover:text-slate-300'"></i>
          </button>

          <div class="text-center space-y-1">
            <span class="text-xs font-bold tracking-wider" 
                  :class="isScanning ? 'text-cyan-400 font-mono animate-pulse' : 'text-slate-400'"
                  x-text="isScanning ? (lang === 'ar' ? `جاري القراءة والمطابقة... ${scanProgress}%` : `Matching biometrics... ${scanProgress}%`) : (lang === 'ar' ? 'اضغط للمصادقة عبر البصمة الموحدة' : 'Tap to authenticate biometrics')">
            </span>
            <p class="text-[9.5px] text-slate-500" x-text="hasWebAuthnCreds ? (lang === 'ar' ? 'تم الكشف عن بصمة جهاز معتمدة (WebAuthn)' : 'Enrolled WebAuthn Hardware Profile active') : (lang === 'ar' ? 'المستشعر الذكي جاهز للاستخدام' : 'Smart virtual biometric sensor ready')"></p>
          </div>
        </div>

        <!-- OR Divider -->
        <div class="flex items-center gap-2 justify-center text-slate-600 text-[10px]">
          <span class="h-px bg-slate-800 flex-1"></span>
          <span x-text="lang === 'ar' ? 'أو أدخل الرمز التعريفي' : 'OR ENTER CLINICAL PIN'"></span>
          <span class="h-px bg-slate-800 flex-1"></span>
        </div>

        <!-- PIN INPUT GRID -->
        <div class="space-y-4">
          <!-- Pin Code Visual indicators -->
          <div class="flex justify-center gap-3">
            <template x-for="i in 4">
              <div class="w-3.5 h-3.5 rounded-full transition-all border"
                   :class="pinInput.length >= i ? 'bg-cyan-400 border-cyan-400 scale-110 shadow-[0_0_8px_#22d3ee]' : (pinError ? 'bg-rose-500 border-rose-500 animate-shake' : 'bg-slate-950 border-slate-800')">
              </div>
            </template>
          </div>
          
          <p x-show="pinError" class="text-[10px] text-rose-400 text-center font-bold" x-text="lang === 'ar' ? 'رمز مرور خاطئ! حاول مجدداً' : 'Incorrect PIN! Please try again'"></p>

          <!-- Virtual Numeric Keyboard -->
          <div class="grid grid-cols-3 gap-2 max-w-[260px] mx-auto">
            <template x-for="num in ['1', '2', '3', '4', '5', '6', '7', '8', '9']">
              <button @click="pressPin(num)" class="py-2 rounded-xl bg-slate-950 hover:bg-slate-800 border border-slate-850 text-slate-200 text-sm font-bold active:scale-95 transition-all">
                <span x-text="num"></span>
              </button>
            </template>
            <button @click="clearPin()" class="py-2 rounded-xl bg-slate-950 hover:bg-rose-950/40 border border-slate-850 text-rose-400 text-xs font-bold active:scale-95 transition-all">
              <span x-text="lang === 'ar' ? 'مسح' : 'CLR'"></span>
            </button>
            <button @click="pressPin('0')" class="py-2 rounded-xl bg-slate-950 hover:bg-slate-800 border border-slate-850 text-slate-200 text-sm font-bold active:scale-95 transition-all">
              <span>0</span>
            </button>
            <button @click="backspacePin()" class="py-2 rounded-xl bg-slate-950 hover:bg-slate-850 border border-slate-850 text-slate-400 text-sm font-bold flex items-center justify-center active:scale-95 transition-all">
              <i data-lucide="delete" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <!-- WEBAUTHN CONSOLE LOGS -->
        <div x-show="webAuthnLogs.length > 0" class="p-3 bg-slate-950 border border-slate-850 rounded-xl space-y-1 max-h-24 overflow-y-auto font-mono text-[8.5px] text-cyan-400 scrollbar-thin">
          <div class="flex justify-between border-b border-slate-900 pb-1 mb-1 text-slate-500 text-[7.5px] font-bold">
            <span>WEBAUTHN ENCLAVE SESSION</span>
            <span>ACTIVE LOGS</span>
          </div>
          <template x-for="log in webAuthnLogs">
            <div class="leading-tight text-left" x-text="log"></div>
          </template>
        </div>

        <!-- Footer Clinician Identity -->
        <div class="pt-4 border-t border-slate-800/50 flex justify-between items-center text-[10px] text-slate-400">
          <span x-text="lang === 'ar' ? 'الطبيب المكتشف افتراضياً:' : 'Auto-detected Clinician:'"></span>
          <span class="font-bold text-cyan-400" x-text="lang === 'ar' ? activeClinician.nameAr : activeClinician.nameEn"></span>
        </div>

      </div>
    </div>
  </template>

  <!-- 2. MAIN APPLICATION WORKSPACE -->
  <template x-if="!showLockScreen">
    <div class="flex h-screen overflow-hidden">
      
      <!-- SIDEBAR -->
      <aside class="w-64 bg-slate-900 border-l border-slate-800 flex flex-col h-full shrink-0 z-20">
        
        <!-- Hospital Branding Header -->
        <div class="p-5 border-b border-slate-800/80 space-y-2">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-cyan-600/20 border border-cyan-500/30 flex items-center justify-center text-cyan-400 animate-pulse">
              <i data-lucide="activity" class="w-4 h-4"></i>
            </div>
            <div>
              <h2 class="text-sm font-extrabold text-slate-100" x-text="lang === 'ar' ? 'مستشفى الشفاء التخصصي' : 'Al-Shifa Specialty Hospital'"></h2>
              <p class="text-[9.5px] text-slate-400" x-text="lang === 'ar' ? 'قسم الطوارئ والقلب والـ ICU' : 'Emergency & ICU Core'"></p>
            </div>
          </div>
        </div>

        <!-- Navigation items -->
        <nav class="flex-1 p-3 space-y-1.5 overflow-y-auto">
          <button @click="currentTab = 'DASHBOARD'" 
                  class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all text-xs font-bold"
                  :class="currentTab === 'DASHBOARD' ? 'bg-cyan-600/20 text-cyan-400 border border-cyan-500/20' : 'text-slate-400 hover:bg-slate-850 hover:text-slate-200'">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
            <span x-text="lang === 'ar' ? 'لوحة المراقبة الرئيسية' : 'Clinical Dashboard'"></span>
          </button>

          <button @click="currentTab = 'PATIENTS_LIST'" 
                  class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all text-xs font-bold"
                  :class="currentTab === 'PATIENTS_LIST' ? 'bg-cyan-600/20 text-cyan-400 border border-cyan-500/20' : 'text-slate-400 hover:bg-slate-850 hover:text-slate-200'">
            <i data-lucide="users" class="w-4 h-4"></i>
            <span x-text="lang === 'ar' ? 'سجلات المرضى النشطين' : 'Active Patient Records'"></span>
          </button>

          <button @click="currentTab = 'ADD_PATIENT'" 
                  class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all text-xs font-bold"
                  :class="currentTab === 'ADD_PATIENT' ? 'bg-cyan-600/20 text-cyan-400 border border-cyan-500/20' : 'text-slate-400 hover:bg-slate-850 hover:text-slate-200'">
            <i data-lucide="user-plus" class="w-4 h-4"></i>
            <span x-text="lang === 'ar' ? 'تسجيل مريض / مؤشرات NEWS2' : 'New Patient Vital Intake'"></span>
          </button>

          <button @click="currentTab = 'AI_COACH'" 
                  class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all text-xs font-bold"
                  :class="currentTab === 'AI_COACH' ? 'bg-cyan-600/20 text-cyan-400 border border-cyan-500/20' : 'text-slate-400 hover:bg-slate-850 hover:text-slate-200'">
            <i data-lucide="bot" class="w-4 h-4"></i>
            <span x-text="lang === 'ar' ? 'مساعد الدعم السريري الذكي' : 'AI Clinical Decision Assistant'"></span>
          </button>

          <button @click="currentTab = 'SETTINGS'" 
                  class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all text-xs font-bold"
                  :class="currentTab === 'SETTINGS' ? 'bg-cyan-600/20 text-cyan-400 border border-cyan-500/20' : 'text-slate-400 hover:bg-slate-850 hover:text-slate-200'">
            <i data-lucide="settings" class="w-4 h-4"></i>
            <span x-text="lang === 'ar' ? 'إعدادات الحماية وWebAuthn' : 'Security & WebAuthn Setup'"></span>
          </button>
        </nav>

        <!-- Logged Clinician Footer -->
        <div class="p-4 border-t border-slate-800 bg-slate-950/60 space-y-3">
          <div class="flex items-center gap-2.5">
            <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-slate-300 font-bold border border-slate-700 text-xs">
              FP
            </div>
            <div>
              <p class="text-xs font-bold text-slate-200" x-text="lang === 'ar' ? activeClinician.nameAr : activeClinician.nameEn"></p>
              <p class="text-[9px] text-cyan-500 font-mono" x-text="lang === 'ar' ? activeClinician.roleAr : activeClinician.roleEn"></p>
            </div>
          </div>
          <button @click="lockApplication()" class="w-full py-1.5 rounded-lg border border-slate-800 bg-slate-900 hover:bg-rose-950/30 hover:border-rose-900/40 text-[10px] text-slate-400 hover:text-rose-400 font-bold flex items-center justify-center gap-1.5 transition-all">
            <i data-lucide="lock" class="w-3.5 h-3.5"></i>
            <span x-text="lang === 'ar' ? 'إغلاق الجلسة وتأمين المحطة' : 'Lock Clinic Workstation'"></span>
          </button>
        </div>

      </aside>

      <!-- VIEW WORKSPACE -->
      <main class="flex-1 bg-slate-950 flex flex-col h-full overflow-hidden">
        
        <!-- Top App Bar / Global Search, Language Toggle -->
        <header class="h-14 bg-slate-900 border-b border-slate-800/80 flex items-center justify-between px-6 z-10">
          <div class="flex items-center gap-4">
            <h1 class="text-base font-extrabold text-slate-100 flex items-center gap-2">
              <span x-show="currentTab === 'DASHBOARD'" x-text="lang === 'ar' ? 'لوحة المراقبة الرئيسية' : 'Clinical Dashboard'"></span>
              <span x-show="currentTab === 'PATIENTS_LIST'" x-text="lang === 'ar' ? 'سجلات المرضى النشطين' : 'Active Patient Records'"></span>
              <span x-show="currentTab === 'ADD_PATIENT'" x-text="lang === 'ar' ? 'تسجيل مريض جديد' : 'New Patient Vital Intake'"></span>
              <span x-show="currentTab === 'AI_COACH'" x-text="lang === 'ar' ? 'مساعد الدعم السريري الذكي' : 'AI Clinical Assistant'"></span>
              <span x-show="currentTab === 'SETTINGS'" x-text="lang === 'ar' ? 'إعدادات الحماية والقياسات الحيوية' : 'Security & Biometrics Settings'"></span>
            </h1>
          </div>

          <div class="flex items-center gap-3">
            <!-- Language Quick Switch -->
            <button @click="toggleLanguage()" class="px-3 py-1.5 rounded-xl bg-slate-950 border border-slate-850 hover:bg-slate-800 text-xs font-bold text-cyan-400 flex items-center gap-1.5 transition-colors">
              <i data-lucide="languages" class="w-3.5 h-3.5"></i>
              <span x-text="lang === 'ar' ? 'English' : 'العربية'"></span>
            </button>

            <!-- Active Security Badge -->
            <div class="flex items-center gap-1.5 px-3 py-1 bg-cyan-950/40 border border-cyan-850 rounded-xl">
              <span class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></span>
              <span class="text-[9.5px] font-bold text-cyan-400 font-mono">SECURE HUB</span>
            </div>
          </div>
        </header>

        <!-- PRIMARY SCROLLABLE TAB CONTAINER -->
        <div class="flex-1 overflow-y-auto p-6 space-y-6">
          
          <!-- TAB 1: CLINICAL DASHBOARD -->
          <div x-show="currentTab === 'DASHBOARD'" class="space-y-6" x-cloak>
            
            <!-- Quick Cards Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <!-- Registered Patients -->
              <div class="bg-slate-900 border border-slate-850 rounded-2xl p-4 flex items-center justify-between relative overflow-hidden group">
                <div class="space-y-1">
                  <span class="text-[10px] font-bold text-slate-400" x-text="lang === 'ar' ? 'إجمالي الحالات النشطة' : 'Total Active Cases'"></span>
                  <p class="text-3xl font-extrabold text-slate-100" x-text="patients.length"></p>
                </div>
                <div class="w-10 h-10 rounded-xl bg-cyan-950 text-cyan-400 flex items-center justify-center border border-cyan-900/30">
                  <i data-lucide="users" class="w-5 h-5"></i>
                </div>
              </div>

              <!-- High Risk Flags -->
              <div class="bg-slate-900 border border-slate-850 rounded-2xl p-4 flex items-center justify-between relative overflow-hidden group">
                <div class="space-y-1">
                  <span class="text-[10px] font-bold text-rose-400" x-text="lang === 'ar' ? 'حالات حرجة (NEWS2 ≥ 7)' : 'Critical Alerts (NEWS2 ≥ 7)'"></span>
                  <p class="text-3xl font-extrabold text-rose-400" x-text="patients.filter(p => p.NEWS2Score >= 7).length"></p>
                </div>
                <div class="w-10 h-10 rounded-xl bg-rose-950 text-rose-400 flex items-center justify-center border border-rose-900/30 animate-pulse">
                  <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                </div>
              </div>

              <!-- Average NEWS2 -->
              <div class="bg-slate-900 border border-slate-850 rounded-2xl p-4 flex items-center justify-between relative overflow-hidden group">
                <div class="space-y-1">
                  <span class="text-[10px] font-bold text-yellow-400" x-text="lang === 'ar' ? 'متوسط قيمة الإنذار المبكر' : 'Average NEWS2 Score'"></span>
                  <p class="text-3xl font-extrabold text-yellow-400" x-text="getAverageNews2()"></p>
                </div>
                <div class="w-10 h-10 rounded-xl bg-yellow-950 text-yellow-400 flex items-center justify-center border border-yellow-900/30">
                  <i data-lucide="activity" class="w-5 h-5"></i>
                </div>
              </div>

              <!-- WebAuthn Device Biometrics Active badge -->
              <div class="bg-slate-900 border border-slate-850 rounded-2xl p-4 flex items-center justify-between relative overflow-hidden group">
                <div class="space-y-1">
                  <span class="text-[10px] font-bold text-emerald-400" x-text="lang === 'ar' ? 'حالة التوثيق البيومتري لجهازك' : 'Device WebAuthn Status'"></span>
                  <p class="text-base font-extrabold text-emerald-400 mt-2" x-text="hasWebAuthnCreds ? (lang === 'ar' ? 'مؤمن بالبصمة' : 'Biometric Locked') : (lang === 'ar' ? 'غير مسجل' : 'Not Registered')"></p>
                </div>
                <div class="w-10 h-10 rounded-xl bg-emerald-950 text-emerald-400 flex items-center justify-center border border-emerald-900/30">
                  <i data-lucide="fingerprint" class="w-5 h-5"></i>
                </div>
              </div>
            </div>

            <!-- Primary Division: Critical Alerts List and Emergency Guidance -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              <!-- Left side: Critical Patient Alerts -->
              <div class="lg:col-span-2 bg-slate-900 border border-slate-850 rounded-2xl p-5 space-y-4">
                <div class="flex justify-between items-center">
                  <h3 class="text-sm font-extrabold text-slate-100 flex items-center gap-2">
                    <span class="w-2 h-2 bg-rose-500 rounded-full animate-ping"></span>
                    <span x-text="lang === 'ar' ? 'سلسلة الإنذار المبكر للمستشفى والتدخل السريع' : 'Active Clinical Red Flags / Early Warning'"></span>
                  </h3>
                  <button @click="currentTab = 'PATIENTS_LIST'" class="text-[10.5px] font-bold text-cyan-400 hover:underline" x-text="lang === 'ar' ? 'عرض كافة المرضى' : 'View all active records'"></button>
                </div>

                <div class="space-y-3">
                  <template x-for="pat in patients.filter(p => p.NEWS2Score >= 5)">
                    <div class="p-3 bg-slate-950 border border-slate-850 rounded-xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 transition-transform hover:scale-[1.01]">
                      <div class="space-y-1">
                        <div class="flex items-center gap-2">
                          <span class="text-xs font-bold text-slate-200" x-text="pat.Name"></span>
                          <span class="text-[8px] font-mono px-1.5 py-0.5 rounded bg-slate-900 text-slate-400" x-text="pat.MedicalRecordNumber"></span>
                        </div>
                        <p class="text-[10.5px] text-slate-400">
                          <span class="font-bold text-cyan-500" x-text="pat.Department"></span> | 
                          <span x-text="pat.Symptoms"></span>
                        </p>
                      </div>

                      <div class="flex items-center gap-2.5 shrink-0 self-end sm:self-center">
                        <div class="text-right">
                          <p class="text-[9px] text-slate-500" x-text="lang === 'ar' ? 'قيمة الإنذار' : 'NEWS2 SCORE'"></p>
